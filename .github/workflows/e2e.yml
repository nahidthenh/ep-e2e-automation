name: EmbedPress E2E

on:
  workflow_dispatch:
    inputs:
      ep_free_ref:
        description: "Git ref for WPDevelopers/embedpress (branch / tag / SHA)"
        required: false
        default: main
      ep_pro_ref:
        description: "Git ref for WPDevelopers/embedpress-pro (branch / tag / SHA)"
        required: false
        default: master

# Serialise GitHub Pages deploys so concurrent runs can't race on the same env.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  WP_URL:          http://localhost:8080
  WP_PORT:         8080
  WP_ADMIN_USER:   admin
  WP_ADMIN_PASS:   admin
  WP_ADMIN_EMAIL:  admin@example.com
  WP_TITLE:        "EmbedPress E2E"
  MYSQL_ROOT_PASSWORD: rootpass
  MYSQL_DATABASE:  wordpress
  MYSQL_USER:      wpuser
  MYSQL_PASSWORD:  wppass

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout test harness ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Checkout EmbedPress plugin sources from GitHub ──────────────────────
      # Requires repository secret PLUGIN_REPO_TOKEN — a PAT with `repo` scope
      # that has read access to both private repos.
      - name: Checkout EmbedPress (free)
        uses: actions/checkout@v4
        with:
          repository: WPDevelopers/embedpress
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          ref: ${{ github.event.inputs.ep_free_ref || 'main' }}
          path: .plugin-src/embedpress

      - name: Checkout EmbedPress Pro
        uses: actions/checkout@v4
        with:
          repository: WPDevelopers/embedpress-pro
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          ref: ${{ github.event.inputs.ep_pro_ref || 'master' }}
          path: .plugin-src/embedpress-pro

      # ── Toolchain for building plugins ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # No PHP/Composer toolchain: both EmbedPress repos ship their PHP deps
      # pre-bundled — Free commits `vendor/`, Pro commits the Mozart-composed
      # `includes/Dependencies/`. Running `composer install` would force CI
      # to authenticate against private VCS repos (priyomukul/wp-notice,
      # WPDevelopers/licensing) for no functional benefit.

      # ── Install harness dependencies (Playwright etc.) ──────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Build plugin assets ─────────────────────────────────────────────────
      # PHP deps are already vendored in the cloned repos — skip composer.
      # We still run the npm asset build if a build script is present, so
      # JS/CSS bundles in /assets/ are produced fresh from the cloned source.
      - name: Build EmbedPress plugin assets
        run: |
          set -euo pipefail
          for dir in .plugin-src/embedpress .plugin-src/embedpress-pro; do
            echo "──────── Building $dir ────────"
            pushd "$dir" > /dev/null

            if [ -f package.json ]; then
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              npm run build --if-present
            fi

            popd > /dev/null
          done

      - name: Expose plugin paths to install steps
        run: |
          echo "EP_FREE_PLUGIN_PATH=.plugin-src/embedpress"     >> "$GITHUB_ENV"
          echo "EP_PRO_PLUGIN_PATH=.plugin-src/embedpress-pro"  >> "$GITHUB_ENV"

      # ── Docker ──────────────────────────────────────────────────────────────
      - name: Build & start containers
        run: docker compose up -d --build

      - name: Wait for WordPress
        run: bash scripts/wait-for-wp.sh "$WP_URL/wp-login.php"

      # ── WordPress install + plugins + seed ──────────────────────────────────
      - name: Install WordPress core
        run: |
          docker exec ep_e2e_wp wp core install \
            --url="$WP_URL" --title="$WP_TITLE" \
            --admin_user="$WP_ADMIN_USER" --admin_password="$WP_ADMIN_PASS" \
            --admin_email="$WP_ADMIN_EMAIL" --skip-email \
            --path=/var/www/html --allow-root

      - name: Install Elementor
        run: |
          docker exec ep_e2e_wp wp plugin install elementor --activate \
            --path=/var/www/html --allow-root

      - name: Install EmbedPress (free) from GitHub build
        run: |
          docker exec ep_e2e_wp wp plugin delete embedpress \
            --path=/var/www/html --allow-root 2>/dev/null || true
          docker exec ep_e2e_wp mkdir -p /var/www/html/wp-content/plugins/embedpress
          docker cp "$EP_FREE_PLUGIN_PATH/." ep_e2e_wp:/var/www/html/wp-content/plugins/embedpress/
          docker exec ep_e2e_wp wp plugin activate embedpress \
            --path=/var/www/html --allow-root

      - name: Install EmbedPress Pro from GitHub build
        run: |
          docker exec ep_e2e_wp mkdir -p /var/www/html/wp-content/plugins/embedpress-pro
          docker cp "$EP_PRO_PLUGIN_PATH/." ep_e2e_wp:/var/www/html/wp-content/plugins/embedpress-pro/
          docker exec ep_e2e_wp wp plugin activate embedpress-pro \
            --path=/var/www/html --allow-root

      - name: Configure WordPress settings
        run: |
          docker exec ep_e2e_wp wp rewrite structure '/%postname%/' --hard \
            --path=/var/www/html --allow-root
          docker exec ep_e2e_wp wp core update-db \
            --path=/var/www/html --allow-root
          docker exec ep_e2e_wp wp rewrite flush \
            --path=/var/www/html --allow-root

      - name: Fix wp-content ownership
        # wp-cli ran as root, so plugin/theme files are root-owned. Apache runs
        # as www-data — without this chown, dashboard deletes fail with
        # "Could not fully remove the plugin/theme".
        run: docker exec ep_e2e_wp chown -R www-data:www-data /var/www/html/wp-content

      - name: Seed test pages from sources.json
        run: bash scripts/seed-pages.sh

      # ── Playwright tests ─────────────────────────────────────────────────────
      - name: Run Playwright tests
        # No --reporter override — let playwright.config.ts decide so the
        # Slack reporter is included automatically when SLACK_* secrets are set.
        # continue-on-error: failing tests won't abort the job, so the report
        # still uploads and publishes to Pages. Note: the job will be marked
        # green even on test failures — check the report or Slack for status.
        continue-on-error: true
        run: npx playwright test
        env:
          WP_URL:           ${{ env.WP_URL }}
          WP_ADMIN_USER:    ${{ env.WP_ADMIN_USER }}
          WP_ADMIN_PASS:    ${{ env.WP_ADMIN_PASS }}
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          retention-days: 7

      - name: Stop containers
        if: always()
        run: docker compose down -v

  # ── Publish Playwright report to GitHub Pages ──────────────────────────────
  # Runs after `e2e` completes, even if tests failed, so failure reports are
  # browsable at the Pages URL. Requires:
  #   Settings → Pages → Build and deployment → Source = "GitHub Actions"
  deploy-report:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: report

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
