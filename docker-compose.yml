version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: ep_e2e_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wpuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wppass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ep_e2e_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wppass}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG: "1"
      # YouTube Data API key — surfaced in the container so wp-cli (run via
      # `docker exec`) can read it. setup-wp.sh writes it into the
      # `embedpress:youtube` option; without a key, channel-based sources
      # render the EmbedPress placeholder instead of real content.
      YT_SECRET: ${YT_SECRET:-}
    volumes:
      - wp_data:/var/www/html
      - ./scripts:/scripts
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

volumes:
  db_data:
  wp_data:
